<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<title>旅行行程 Planner</title>
<style>
  body { font-family: sans-serif; margin: 40px; }
  h1 { margin-bottom: 10px; }
  .controls { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .day { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
  .items { margin-top: 10px; }
  .item { display: flex; gap:8px; margin-bottom: 6px; }
  .item input { flex: 1; padding: 6px; }
  button { padding: 6px 12px; cursor: pointer; }
  .small { padding:4px 8px; font-size:14px; }
  .status { color: #666; font-size: 13px; margin-left: auto; }
  .drive-status { color: #1a73e8; font-size: 13px; font-weight: bold; }
</style>
</head>
<body>

<h1>旅行行程 Planner</h1>

<div class="controls">
  <button id="addDayBtn">➕</button>
  <button id="exportBtn">📤</button>
  <button id="importBtn">📥</button>
  <button id="exportHtmlBtn">📦</button>
  <button id="clearBtn">🗑️</button>
  <button id="driveLoginBtn" style="background:#1a73e8;color:white;">🔗 登入 Google Drive</button>
  <button id="driveSaveBtn" style="background:#34a853;color:white;display:none;">☁️ 儲存到雲端</button>
  <button id="driveLoadBtn" style="background:#fbbc04;color:white;display:none;">⬇️ 從雲端載入</button>
  <span class="status" id="statusText"></span>
  <span class="drive-status" id="driveStatusText"></span>
</div>

<div id="days"></div>

<input type="file" id="importFileInput" accept=".json" style="display: none;" />

<script id="embedded-data" type="application/json">[]</script>

<script src="https://accounts.google.com/gsi/client"></script>

<script>
(function() {
  var STORAGE_KEY = 'travel_planner_data';
  var DRIVE_FILE_NAME = 'travel_planner_data.json';
  var CLIENT_ID = '972373356405-p9kalp5j1ghhehc40a3trv12o2cb9k1p.apps.googleusercontent.com';
  var API_KEY = 'AIzaSyBAPtBzfRj8fuP_m9Wv56-KjvWcAifqDTM'; // 等一下設定
  var DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
  var SCOPES = 'https://www.googleapis.com/auth/drive.file';

  var tokenClient;
  var accessToken = null;
  var driveFileId = null;
  var isLoadingEmbedded = false;

  // ========== Google Identity Services ==========
  function initGapi() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: function(response) {
        if (response.error) {
          alert('登入失敗：' + response.error);
          return;
        }
        accessToken = response.access_token;
        document.getElementById('driveStatusText').textContent = '已連接 Google Drive';
        document.getElementById('driveLoginBtn').style.display = 'none';
        document.getElementById('driveSaveBtn').style.display = 'inline-block';
        document.getElementById('driveLoadBtn').style.display = 'inline-block';
        // 登入後自動尋找或建立雲端檔案
        findOrCreateDriveFile();
      }
    });
  }

  function handleDriveLogin() {
    if (accessToken) {
      // 已登入，重新整理 token
      tokenClient.requestAccessToken();
    } else {
      tokenClient.requestAccessToken();
    }
  }

  // ========== Google Drive API 操作 ==========
  function findOrCreateDriveFile() {
    if (!accessToken) return;

    // 先搜尋是否已有這個檔案
    fetch('https://www.googleapis.com/drive/v3/files?q=name=\'' + encodeURIComponent(DRIVE_FILE_NAME) + '\'&spaces=drive&fields=files(id,name)', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.files && data.files.length > 0) {
        driveFileId = data.files[0].id;
        document.getElementById('driveStatusText').textContent = '雲端檔案已連接';
        // 自動從雲端載入
        loadFromDrive(true);
      } else {
        // 不存在，建立新檔案
        createDriveFile();
      }
    })
    .catch(function(err) {
      console.error('搜尋雲端檔案失敗', err);
    });
  }

  function createDriveFile() {
    var data = collectData();
    var fileContent = JSON.stringify(data);
    var file = new Blob([fileContent], { type: 'application/json' });

    var metadata = {
      name: DRIVE_FILE_NAME,
      mimeType: 'application/json'
    };

    var formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    formData.append('file', file);

    fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + accessToken },
      body: formData
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      driveFileId = data.id;
      document.getElementById('driveStatusText').textContent = '雲端檔案已建立';
    })
    .catch(function(err) {
      console.error('建立雲端檔案失敗', err);
      alert('建立雲端檔案失敗，請確認 API 已啟用');
    });
  }

  function loadFromDrive(silent) {
    if (!accessToken) {
      alert('請先登入 Google Drive');
      return;
    }
    if (!driveFileId) {
      alert('找不到雲端檔案 ID，請重新整理網頁後再登入一次');
      return;
    }

    fetch('https://www.googleapis.com/drive/v3/files/' + driveFileId + '?alt=media', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    })
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      if (!Array.isArray(data)) throw new Error('格式錯誤');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      document.getElementById('days').innerHTML = '';
      data.forEach(function(day) { addDay(day); });
      updateStatus();
      if (!silent) alert('從雲端載入成功！');
    })
    .catch(function(err) {
      console.error('載入失敗', err);
      if (!silent) alert('載入失敗：' + err.message);
    });
  }

  function saveToDrive() {
    if (!accessToken) {
      alert('請先登入 Google Drive（缺少 accessToken）');
      return;
    }
    if (!driveFileId) {
      alert('找不到雲端檔案 ID，請重新整理網頁後再登入一次');
      return;
    }

    var data = collectData();
    var fileContent = JSON.stringify(data);
    var file = new Blob([fileContent], { type: 'application/json' });

    fetch('https://www.googleapis.com/upload/drive/v3/files/' + driveFileId + '?uploadType=media', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + accessToken },
      body: file
    })
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function() {
      document.getElementById('driveStatusText').textContent = '已儲存到雲端';
      alert('儲存到雲端成功！');
    })
    .catch(function(err) {
      console.error('儲存到雲端失敗', err);
      alert('儲存失敗：' + err.message + '\n\n請嘗試重新整理網頁再登入一次');
    });
  }

  // ========== 原本的 Planner 功能 ==========
  function getEmbeddedData() {
    var el = document.getElementById('embedded-data');
    if (!el) return null;
    try {
      var data = JSON.parse(el.textContent.trim());
      if (Array.isArray(data) && data.length > 0) return data;
    } catch (e) {}
    return null;
  }

  function init() {
    // 初始化 Google Identity Services
    if (typeof google !== 'undefined' && google.accounts) {
      initGapi();
    }

    document.getElementById('addDayBtn').addEventListener('click', function() { addDay(); });
    document.getElementById('exportBtn').addEventListener('click', exportJSON);
    document.getElementById('importBtn').addEventListener('click', function() {
      document.getElementById('importFileInput').click();
    });
    document.getElementById('importFileInput').addEventListener('change', importJSON);
    document.getElementById('exportHtmlBtn').addEventListener('click', exportStandaloneHTML);
    document.getElementById('clearBtn').addEventListener('click', function() {
      if (!confirm('確定要清除所有儲存？')) return;
      localStorage.removeItem(STORAGE_KEY);
      document.getElementById('days').innerHTML = '';
      updateStatus();
    });
    document.getElementById('driveLoginBtn').addEventListener('click', handleDriveLogin);
    document.getElementById('driveSaveBtn').addEventListener('click', saveToDrive);
    document.getElementById('driveLoadBtn').addEventListener('click', function() { loadFromDrive(false); });

    var embedded = getEmbeddedData();
    if (embedded) {
      isLoadingEmbedded = true;
      document.getElementById('days').innerHTML = '';
      embedded.forEach(function(day) { addDay(day); });
      isLoadingEmbedded = false;
      saveToStorage();
      updateStatus();
    } else {
      loadFromStorage();
    }
  }

  function updateStatus() {
    var data = collectData();
    var st = document.getElementById('statusText');
    var dc = data.length;
    var ic = data.reduce(function(sum, d) { return sum + (d.items || []).length; }, 0);
    if (dc === 0 && ic === 0) {
      st.textContent = '尚未儲存';
    } else {
      st.textContent = '已儲存：' + dc + ' 天，' + ic + ' 個行程';
    }
  }

  function addDay(data) {
    data = data || {};
    var days = document.getElementById('days');
    var d = document.createElement('div');
    d.className = 'day';
    d.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<h3 contenteditable="true" class="day-title" style="margin:0;">' + escapeHtml(data.title || 'Day 標題（可編輯）') + '</h3>' +
        '<div><button class="small remove-day">刪除這天</button></div>' +
      '</div>' +
      '<div class="items"></div>' +
      '<div style="margin-top:8px;"><button class="small add-item">新增行程</button></div>';
    days.appendChild(d);

    var itemsContainer = d.querySelector('.items');
    (data.items || []).forEach(function(it) { addItemToContainer(itemsContainer, it); });

    d.querySelector('.add-item').addEventListener('click', function() {
      addItemToContainer(itemsContainer, { text: '' });
      saveToStorage();
    });
    d.querySelector('.remove-day').addEventListener('click', function() {
      if (!confirm('刪除此天？')) return;
      d.remove();
      saveToStorage();
    });
    d.querySelector('.day-title').addEventListener('input', saveToStorage);
    itemsContainer.addEventListener('input', saveToStorage);

    if (!isLoadingEmbedded) {
      saveToStorage();
    }
  }

  function addItemToContainer(container, data) {
    data = data || {};
    var item = document.createElement('div');
    item.className = 'item';
    item.innerHTML =
      '<input class="item-input" placeholder="行程內容（可輸入）" value="' + escapeAttr(data.text || '') + '" />' +
      '<button class="small remove-item">刪除</button>';
    container.appendChild(item);
    item.querySelector('.remove-item').addEventListener('click', function() {
      item.remove();
      saveToStorage();
    });
  }

  function collectData() {
    var days = [];
    document.querySelectorAll('#days .day').forEach(function(d) {
      var title = d.querySelector('.day-title').innerText.trim();
      var items = [];
      d.querySelectorAll('.item .item-input').forEach(function(i) {
        items.push({ text: i.value });
      });
      days.push({ title: title, items: items });
    });
    return days;
  }

  function saveToStorage() {
    var data = collectData();
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      updateStatus();
    } catch (e) {
      console.error('儲存失敗', e);
    }
  }

  function loadFromStorage() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      updateStatus();
      return;
    }
    try {
      var data = JSON.parse(raw);
      document.getElementById('days').innerHTML = '';
      data.forEach(function(day) { addDay(day); });
      updateStatus();
    } catch (e) {
      console.error('載入失敗', e);
    }
  }

  function exportJSON() {
    var data = collectData();
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var dateStr = new Date().toISOString().slice(0, 10);
    a.download = 'travel_plan_' + dateStr + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    alert('匯出成功！');
  }

  function exportStandaloneHTML() {
    var data = collectData();
    var dataJSON = JSON.stringify(data);
    var htmlSource = document.documentElement.outerHTML;

    var el = document.getElementById('embedded-data');
    if (!el) {
      alert('匯出失敗：找不到內嵌資料區塊');
      return;
    }

    var tagString = el.outerHTML;
    var idx = htmlSource.indexOf(tagString);
    if (idx === -1) {
      alert('匯出失敗：無法定位內嵌資料區塊');
      return;
    }

    var beforeEnd = idx + tagString.indexOf('>') + 1;
    var afterStart = idx + tagString.lastIndexOf('<');
    var before = htmlSource.substring(0, beforeEnd);
    var after = htmlSource.substring(afterStart);
    var standaloneHTML = before + dataJSON + after;

    var blob = new Blob([standaloneHTML], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var dateStr = new Date().toISOString().slice(0, 10);
    a.download = 'travel_planner_' + dateStr + '.html';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    alert('匯出成功！');
  }

  function importJSON(event) {
    var file = event.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error('格式錯誤');
        var currentData = localStorage.getItem(STORAGE_KEY);
        if (currentData && currentData !== '[]') {
          if (!confirm('匯入將會覆蓋現有行程，確定繼續？')) return;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        document.getElementById('days').innerHTML = '';
        data.forEach(function(day) { addDay(day); });
        updateStatus();
        alert('匯入成功！');
      } catch (err) {
        alert('匯入失敗：' + err.message);
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(s) {
    return escapeHtml(s).replace(/\n/g, '&#10;');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
