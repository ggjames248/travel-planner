<script>
(function() {
  var STORAGE_KEY = 'travel_planner_data';
  var DRIVE_FILE_NAME = 'travel_planner_data.json';
  var CLIENT_ID = '972373356405-p9kalp5j1ghhehc40a3trv12o2cb9k1p.apps.googleusercontent.com';
  var API_KEY = 'AIzaSyBAPtBzfRj8fuP_m9Wv56-KjvWcAifqDTM';
  var DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
  var SCOPES = 'https://www.googleapis.com/auth/drive.file';

  var tokenClient;
  var accessToken = null;
  var driveFileId = null;
  var isLoadingEmbedded = false;

  function initGapi() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: function(response) {
        if (response.error) { alert('登入失敗：' + response.error); return; }
        accessToken = response.access_token;
        document.getElementById('driveStatusText').textContent = '已連接 Google Drive';
        document.getElementById('driveLoginBtn').style.display = 'none';
        document.getElementById('driveSaveBtn').style.display = 'inline-block';
        document.getElementById('driveLoadBtn').style.display = 'inline-block';
        findOrCreateDriveFile();
      }
    });
  }

  function handleDriveLogin() {
    if (accessToken) { tokenClient.requestAccessToken(); }
    else { tokenClient.requestAccessToken(); }
  }

  function findOrCreateDriveFile() {
    if (!accessToken) return;
    fetch('https://www.googleapis.com/drive/v3/files?q=name=\'' + encodeURIComponent(DRIVE_FILE_NAME) + '\'&spaces=drive&fields=files(id,name)', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.files && data.files.length > 0) {
        driveFileId = data.files[0].id;
        document.getElementById('driveStatusText').textContent = '雲端檔案已連接';
        loadFromDrive(true);
      } else { createDriveFile(); }
    })
    .catch(function(err) { console.error('搜尋雲端檔案失敗', err); });
  }

  function createDriveFile() {
    var data = collectData();
    var file = new Blob([JSON.stringify(data)], { type: 'application/json' });
    var metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
    var formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    formData.append('file', file);
    fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: formData
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      driveFileId = data.id;
      document.getElementById('driveStatusText').textContent = '雲端檔案已建立';
    })
    .catch(function(err) { console.error('建立雲端檔案失敗', err); });
  }

  function loadFromDrive(silent) {
    if (!accessToken) { alert('請先登入 Google Drive'); return; }
    if (!driveFileId) { alert('找不到雲端檔案 ID'); return; }
    fetch('https://www.googleapis.com/drive/v3/files/' + driveFileId + '?alt=media', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    })
    .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      document.getElementById('days').innerHTML = '';
      data.forEach(function(day) { addDay(day); });
      updateStatus();
      if (!silent) alert('從雲端載入成功！');
    })
    .catch(function(err) { console.error('載入失敗', err); });
  }

  function saveToDrive() {
    if (!accessToken) { alert('請先登入 Google Drive'); return; }
    if (!driveFileId) { alert('找不到雲端檔案 ID'); return; }
    var data = collectData();
    var file = new Blob([JSON.stringify(data)], { type: 'application/json' });
    fetch('https://www.googleapis.com/upload/drive/v3/files/' + driveFileId + '?uploadType=media', {
      method: 'PATCH', headers: { 'Authorization': 'Bearer ' + accessToken }, body: file
    })
    .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function() {
      document.getElementById('driveStatusText').textContent = '已儲存到雲端';
      alert('儲存到雲端成功！');
    })
    .catch(function(err) { console.error('儲存失敗', err); });
  }

  function getEmbeddedData() {
    var el = document.getElementById('embedded-data');
    if (!el) return null;
    try {
      var data = JSON.parse(el.textContent.trim());
      if (Array.isArray(data) && data.length > 0) return data;
    } catch (e) {}
    return null;
  }

  function init() {
    if (typeof google !== 'undefined' && google.accounts) { initGapi(); }
    document.getElementById('addDayBtn').addEventListener('click', function() { addDay(); });
    document.getElementById('exportBtn').addEventListener('click', exportJSON);
    document.getElementById('importBtn').addEventListener('click', function() { document.getElementById('importFileInput').click(); });
    document.getElementById('importFileInput').addEventListener('change', importJSON);
    document.getElementById('exportHtmlBtn').addEventListener('click', exportStandaloneHTML);
    document.getElementById('clearBtn').addEventListener('click', function() {
      if (!confirm('確定要清除所有儲存？')) return;
      localStorage.removeItem(STORAGE_KEY);
      document.getElementById('days').innerHTML = '';
      updateStatus();
    });
    document.getElementById('driveLoginBtn').addEventListener('click', handleDriveLogin);
    document.getElementById('driveSaveBtn').addEventListener('click', saveToDrive);
    document.getElementById('driveLoadBtn').addEventListener('click', function() { loadFromDrive(false); });

    var embedded = getEmbeddedData();
    if (embedded) {
      isLoadingEmbedded = true;
      document.getElementById('days').innerHTML = '';
      embedded.forEach(function(day) { addDay(day); });
      isLoadingEmbedded = false;
      saveToStorage();
      updateStatus();
    } else { loadFromStorage(); }
  }

  function updateStatus() {
    var data = collectData();
    var st = document.getElementById('statusText');
    var dc = data.length;
    var ic = data.reduce(function(sum, d) { return sum + (d.items || []).length; }, 0);
    st.textContent = (dc === 0 && ic === 0) ? '尚未儲存' : '已儲存：' + dc + ' 天，' + ic + ' 個行程';
  }

  function addDay(data) {
    data = data || {};
    var days = document.getElementById('days');
    var d = document.createElement('div');
    d.className = 'day';
    d.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<h3 contenteditable="true" class="day-title" style="margin:0;">' + escapeHtml(data.title || 'Day 1') + '</h3>' +
        '<div><button class="small remove-day">刪除這天</button></div>' +
      '</div>' +
      '<div class="items"></div>' +
      '<div class="day-bottom" style="margin-top:8px; display:flex; gap:8px; align-items:center;">' +
        '<button class="small add-item">新增</button>' +
      '</div>';
    days.appendChild(d);

    var itemsContainer = d.querySelector('.items');
    (data.items || []).forEach(function(it) { addItemToContainer(itemsContainer, it); });

    d.querySelector('.add-item').addEventListener('click', function() {
      addItemToContainer(itemsContainer, { text: '' });
      saveToStorage();
    });
    d.querySelector('.remove-day').addEventListener('click', function() {
      if (!confirm('刪除此天？')) return;
      d.remove();
      saveToStorage();
    });
    d.querySelector('.day-title').addEventListener('input', saveToStorage);
    itemsContainer.addEventListener('input', saveToStorage);
    if (!isLoadingEmbedded) { saveToStorage(); }
  }

  function addItemToContainer(container, data) {
    data = data || {};
    var item = document.createElement('div');
    item.style.cssText = 'display:block; margin-bottom:6px;';

    var timeValue = data.time || '';
    var timeOptions = ['','下午', '晚上'];
    var timeSelect = '<select class="item-time" style="width:70px; padding:6px; flex-shrink:0;">';
    timeOptions.forEach(function(opt) {
      var selected = (timeValue === opt) ? ' selected' : '';
      timeSelect += '<option value="' + opt + '"' + selected + '>' + (opt || '上午') + '</option>';
    });
    timeSelect += '</select>';

    var mainRow = document.createElement('div');
    mainRow.style.cssText = 'display:flex; gap:8px; align-items:center;';
    mainRow.innerHTML =
      timeSelect +
      '<input class="item-input" placeholder="行程內容（可輸入）" value="' + escapeAttr(data.text || '') + '" style="flex:1;" />' +
      '<button class="small remove-item">刪除</button>' +
      '<button class="small add-sub-item" style="font-size:12px; margin-left:4px;">+</button>';

    var subContainer = document.createElement('div');
    subContainer.className = 'sub-items';
    subContainer.style.cssText = 'margin-left:78px; margin-top:4px;';

    item.appendChild(mainRow);
    item.appendChild(subContainer);
    container.appendChild(item);

    (data.children || []).forEach(function(child) {
      addSubItem(subContainer, child);
    });

    item.querySelector('.item-time').addEventListener('change', saveToStorage);
    mainRow.querySelector('.add-sub-item').addEventListener('click', function() {
      addSubItem(subContainer, { text: '' });
      saveToStorage();
    });
    item.querySelector('.remove-item').addEventListener('click', function() {
      item.remove();
      saveToStorage();
    });
    mainRow.querySelector('.item-input').addEventListener('input', saveToStorage);
  }

  function addSubItem(container, data) {
    data = data || {};
    var sub = document.createElement('div');
    sub.style.cssText = 'display:flex; gap:6px; align-items:center; margin-bottom:4px;';
    sub.innerHTML =
      '<span style="flex-shrink:0; font-size:12px; color:#888;">└</span>' +
      '<input class="item-input" placeholder="子行程內容" value="' + escapeAttr(data.text || '') + '" style="flex:1;" />' +
      '<button class="small remove-item" style="font-size:12px;">刪除</button>';
    container.appendChild(sub);
    sub.querySelector('.remove-item').addEventListener('click', function() { sub.remove(); saveToStorage(); });
    sub.querySelector('.item-input').addEventListener('input', saveToStorage);
  }

  function collectData() {
    var days = [];
    document.querySelectorAll('#days .day').forEach(function(d) {
      var title = d.querySelector('.day-title').innerText.trim();
      var items = [];
      var topItems = d.querySelectorAll('.items > div');
      topItems.forEach(function(itemDiv) {
        if (itemDiv.classList.contains('sub-items')) return;
        var mainRow = itemDiv.querySelector('div');
        if (!mainRow) return;
        var timeSelect = mainRow.querySelector('.item-time');
        var timeValue = timeSelect ? timeSelect.value : '';
        var textInput = mainRow.querySelector('.item-input');
        var textValue = textInput ? textInput.value : '';
        var children = [];
        var subItems = itemDiv.querySelector('.sub-items');
        if (subItems) {
          subItems.querySelectorAll('div').forEach(function(sub) {
            var subInput = sub.querySelector('.item-input');
            if (subInput) children.push({ text: subInput.value });
          });
        }
        items.push({ time: timeValue, text: textValue, children: children });
      });
      days.push({ title: title, items: items });
    });
    return days;
  }

  function saveToStorage() {
    var data = collectData();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); updateStatus(); } catch (e) {}
  }

  function loadFromStorage() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { updateStatus(); return; }
    try {
      var data = JSON.parse(raw);
      document.getElementById('days').innerHTML = '';
      data.forEach(function(day) { addDay(day); });
      updateStatus();
    } catch (e) {}
  }

  function exportJSON() {
    var data = collectData();
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'travel_plan_' + new Date().toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    alert('匯出成功！');
  }

  function exportStandaloneHTML() {
    var data = collectData();
    var dataJSON = JSON.stringify(data);
    var htmlSource = document.documentElement.outerHTML;
    var el = document.getElementById('embedded-data');
    if (!el) { alert('匯出失敗'); return; }
    var tagString = el.outerHTML;
    var idx = htmlSource.indexOf(tagString);
    var beforeEnd = idx + tagString.indexOf('>') + 1;
    var afterStart = idx + tagString.lastIndexOf('<');
    var standaloneHTML = htmlSource.substring(0, beforeEnd) + dataJSON + htmlSource.substring(afterStart);
    var blob = new Blob([standaloneHTML], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'travel_planner_' + new Date().toISOString().slice(0, 10) + '.html';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    alert('匯出成功！');
  }

  function importJSON(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error('格式錯誤');
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        document.getElementById('days').innerHTML = '';
        data.forEach(function(day) { addDay(day); });
        updateStatus();
        alert('匯入成功！');
      } catch (err) { alert('匯入失敗'); }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/\n/g, '&#10;');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
